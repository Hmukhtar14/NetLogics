- Name: FromPlcToModel_UDTArray
  Type: ObjectLibraryItem
  Description: {"LocaleId":"","Text":"This script mirrors PLC tag structures (including nested objects and arrays) into a FactoryTalk Optix Model folder. \nIt reads configuration for the source node, target folder, an Object Type to be instantiated, and whether to delete existing tags, then recursively creates model objects and variables with dynamic links to the PLC source data.\n\nIf the script is ran for the first time, the Objects/Tags will be created. If it is ran for the second time, the Objects/Tags will be updated.\n\nTO USE:\nSimply populate the variables in the properties pane and look into the descrption of each variable for more info\n"}
