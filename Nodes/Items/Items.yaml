- Name: DataGridSynchronizer
  Type: ObjectLibraryItem
  Description: {"LocaleId":"","Text":"Description:\nThis script allows for querying a database table and populating a DataGrid with columns at runtime.\n\nPurpose:\nThis script was made to address the gap of ODBC databases lack of tables sync while offline, and the need of manual creation of tables and columns in order to be displayed in a datagrid.\n\nHow to use:\n1. Populate the pointer variables:\n       -  Database_Pointer → your Store (database)\n        - DataGrid_Pointer → your DataGrid \n\n2. Through a button or an event, Call the QueryOnStore method and pass the desired Table name as an argument in the Table Variable."}
